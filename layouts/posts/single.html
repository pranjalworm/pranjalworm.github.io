{{ define "main" }}
  <article class="post-content">
    <h1 class="post-title">{{ .Title }}</h1>
    <div>
      <time datetime="{{ .Date.Format "2006-01-02" }}" class="post-date">
        {{ .Date.Format "January 2, 2006" }}
      </time>
    </div>
    <div>
      {{ .Content }}
    </div>
  </article>

  {{- partial "suggested-posts.html" . -}}
{{ end }}
