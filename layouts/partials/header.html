{{ $currentPath := .RelPermalink }}

<header class="site-header">
  <div class="header-bar">
    <div class="header-inner">
      <a href="/" class="nav-link header-brand">
        <img src="/images/pranjal-profile-pic.webp"
             class="profile-pic"
             alt="Pranjal Dubey Photograph"
             width="50" height="50">
        <span class="site-title">Pranjal Dubey</span>
      </a>

      <nav class="desktop-nav">
        <a href="/" class="nav-link desktop-nav-item{{ if eq $currentPath "/" }} active{{ end }}">Blog</a>
        <a href="/projects/" class="nav-link desktop-nav-item{{ if hasPrefix $currentPath "/projects" }} active{{ end }}">Projects</a>
        <a href="/about/" class="nav-link desktop-nav-item{{ if hasPrefix $currentPath "/about" }} active{{ end }}">About</a>
        <button class="theme-toggle" onclick="toggleDarkMode()" aria-label="Toggle dark mode">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </nav>

      <button id="menu-button" class="hamburger" onclick="toggleMenu()" aria-label="Toggle menu" aria-expanded="false" aria-controls="nav-menu">
        <div class="hamburger-line"></div>
        <div class="hamburger-line"></div>
      </button>
    </div>
  </div>

  {{- partial "menu.html" . -}}
</header>
