<a href="{{ .RelPermalink }}" class="nav-link post-card">
  <div class="post-card-image-wrapper">
    <img src="/images/{{ .Params.thumbnail }}"
         alt="{{ .Title }}"
         class="post-card-image"
         loading="lazy">
  </div>

  <div class="post-card-text">
    <time datetime="{{ .Date.Format "2006-01-02" }}" class="post-date">
      {{ .Date.Format "January 2, 2006" }}
    </time>

    <div class="post-card-title">{{ .Title }}</div>

    <div class="post-card-description">{{ .Params.description }}</div>
  </div>
</a>
