<!DOCTYPE html>
<html lang="en">
<head>
  {{- partial "head.html" . -}}
</head>
<body>
  <div class="site-container">
    {{- partial "header.html" . -}}
    <main class="main-content">
      {{- block "main" . }}{{ end -}}
    </main>
  </div>
  {{- partial "footer.html" . -}}
  {{ $js := resources.Get "js/main.js" }}
  {{ if hugo.IsProduction }}
    {{ $js = $js | minify | fingerprint }}
  {{ end }}
  <script src="{{ $js.RelPermalink }}"></script>
</body>
</html>
